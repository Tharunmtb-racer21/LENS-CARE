{% extends "base.html" %}

{% block title %}All Records - Lens Care{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container">
        <h1>📊 All Patient Records</h1>
        <p>Browse all patient records in the database</p>
    </div>
</div>

<div class="container">
    <div class="table-card">
        <div class="table-header">
            <h3>Patient Records</h3>
            <div class="search-box">
                <input type="text" id="tableSearch" placeholder="Search records..." onkeyup="filterTable()">
            </div>
        </div>
        <div class="table-responsive">
            <table id="recordsTable" class="data-table">
                <thead>
                    <tr>
                        <th>Patient ID</th>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Date</th>
                        <th>Diagnosis</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 50px;">
                            <div class="loading">Loading records...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div style="text-align: center; margin-top: 30px;">
        <a href="/" class="btn btn-secondary">Back to Home</a>
    </div>
</div>

<script src="{{ url_for('static', filename='js/all_records.js') }}"></script>
{% endblock %}
