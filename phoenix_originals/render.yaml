services:
  - type: web
    name: lenscare
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lenscare-db
          property: connectionString
      - key: FLASK_ENV
        value: production

databases:
  - name: lenscare-db
    databaseName: lenscare
    user: lenscare_user
    plan: free
